services:
  bot:
    build: .
    container_name: bot-claws
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/data
    command: >
      sh -c "alembic upgrade head &&
             python -m src.main"

  redis:
    image: redis:7-alpine
    container_name: bot-claws-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
